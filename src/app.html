<!doctype html>
<html lang="hr">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<style>
			/* First-paint background so a cold visit never flashes an unstyled frame
			   (the library base would otherwise paint its default red). Keep in sync
			   with --color-bg (white-smoke) in src/styles/index.scss. */
			html,
			body {
				margin: 0;
				background-color: #f3f4f6;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
